app = "mtg-camera-translator"
primary_region = "gru" # São Paulo (Mais rápido pro Brasil)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATABASE_PATH = "/data/db.sqlite3"
  ALLOWED_HOSTS = "*"
  CORS_ALLOW_ALL_ORIGINS = "True"

[mounts]
  source = "sqlite_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
